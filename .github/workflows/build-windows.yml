name: build-windows

# Builds standalone Windows 11 executables with PyInstaller on a real Windows
# runner (PyInstaller cannot cross-compile from Linux). Produces:
#   RotorGUI.exe  — the Tkinter compass app (no console window)
#   rotor.exe     — the command-line client (read/watch/set/gui)
# Both are single-file, no Python install needed on the target machine.

on:
  push:
    branches: [main, add-python-rotor-client]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build RotorGUI.exe (windowed)
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name RotorGUI
          --hidden-import rotorlib
          rotor_gui.py

      - name: Build rotor.exe (console CLI)
        run: >
          pyinstaller --noconfirm --clean --onefile --console
          --name rotor
          --hidden-import rotorlib --hidden-import rotor_gui
          rotorcli.py

      - name: Upload executables
        uses: actions/upload-artifact@v4
        with:
          name: rotor-windows-x64
          path: |
            dist/RotorGUI.exe
            dist/rotor.exe
          if-no-files-found: error
